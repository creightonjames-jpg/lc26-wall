function useFirebase(path) {
  const [data, setData] = useState(null);
  useEffect(() => {
    const ref = db.ref(path);
    const handler = ref.on('value', snap => {
      setData(snap.val());
    });
    return () => ref.off('value', handler);
  }, [path]);
  return data;
}

function fbPush(path, val) { return db.ref(path).push(val); }
function fbSet(path, val) { return db.ref(path).set(val); }
function fbUpdate(path, val) { return db.ref(path).update(val); }
function fbRemove(path) { return db.ref(path).remove(); }

// Convert Firebase object to array with keys
function toArr(obj) {
  if (!obj) return [];
  return Object.entries(obj).map(([k, v]) => ({ ...v, _key: k }));
}

// ─── Helpers ───
const pt = (d,t) => new Date(`${d}T${t}:00-05:00`);
const f12 = t => { const[h,m]=t.split(":").map(Number); return `${h===0?12:h>12?h-12:h}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`; };
const ago = ts => { const m=Math.floor((Date.now()-ts)/60000); if(m<1)return"now"; if(m<60)return m+"m"; const h=Math.floor(m/60); return h<24?h+"h":Math.floor(h/24)+"d"; };

function compress(file, maxW=800, q=0.6) {
  return new Promise(r => {
    const rd = new FileReader();
    rd.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        const ratio = Math.min(maxW/img.width, maxW/img.height, 1);
        c.width = img.width*ratio; c.height = img.height*ratio;
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        r(c.toDataURL("image/jpeg", q));
      };
      img.src = ev.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// ─── Countdown ───
function Countdown() {
  const [d, setD] = useState(CONF_START - Date.now());
  useEffect(() => { const iv = setInterval(() => setD(CONF_START - Date.now()), 1000); return () => clearInterval(iv); }, []);
  if (d <= 0) return null;
  const days=Math.floor(d/864e5), hrs=Math.floor((d%864e5)/36e5), mins=Math.floor((d%36e5)/6e4), secs=Math.floor((d%6e4)/1e3);
  return (
    <div style={{display:"flex",gap:16,justifyContent:"center",margin:"18px 0"}}>
      {[{v:days,l:"Days"},{v:hrs,l:"Hrs"},{v:mins,l:"Min"},{v:secs,l:"Sec"}].map(u=>(
        <div key={u.l} style={{textAlign:"center"}}>
          <div style={{fontFamily:"var(--ff)",fontSize:42,fontWeight:800,color:"var(--gold)"}}>{String(u.v).padStart(2,"0")}</div>
          <div style={{fontSize:17,color:"var(--mute)",textTransform:"uppercase",letterSpacing:2}}>{u.l}</div>
        </div>
      ))}
    </div>
  );
}

function AgendaTab({dm}) {
  const [now, setNow] = useState(new Date());
  const [day, setDay] = useState(null);
  const rxRaw = useFirebase("reactions");
  const rx = rxRaw || {};
  const [reacted, setReacted] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lc26_reacted") || "{}"); } catch { return {}; }
  });

  useEffect(() => { const iv = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(iv); }, []);
  useEffect(() => {
    if (day !== null) return;
    const td = now.toISOString().slice(0,10);
    const m = AGENDA.find(d => d.date===td) || AGENDA.find(d => d.date>td) || AGENDA[AGENDA.length-1];
    setDay(m.day);
  }, [now, day]);

  const dd = AGENDA.find(d => d.day===day) || AGENDA[0];

  const hasReacted = (ek, em) => !!(reacted[ek] && reacted[ek][em]);

  const react = (ek, em) => {
    if (hasReacted(ek, em)) return;
    const cur = (rx[ek] && rx[ek][em]) || 0;
    fbUpdate(`reactions/${ek}`, { [em]: cur + 1 });
    const nr = { ...reacted };
    if (!nr[ek]) nr[ek] = {};
    nr[ek][em] = true;
    setReacted(nr);
    try { localStorage.setItem("lc26_reacted", JSON.stringify(nr)); } catch {}
  };

  let cur=null, nxt=null;
  for (const d of AGENDA) { for (const ev of d.ev) {
    const s=pt(d.date,ev.t), e=pt(d.date,ev.e);
    if(now>=s&&now<e&&!cur) cur={...ev,dl:d.label};
    if(s>now&&!nxt) nxt={...ev,dl:d.label};
    if(cur&&nxt)break;
  } if(cur&&nxt)break; }

  return (
    <div>
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",background:"rgba(255,107,74,0.05)"}}>

function QTab({dm}) {
  const raw = useFirebase("questions");
  const items = toArr(raw);
  const [sort, setSort] = useState("votes");
  const [txt, setTxt] = useState(""); const [nm, setNm] = useState("");
  const [voted, setVoted] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lc26_voted") || "{}"); } catch { return {}; }
  });

  const sub = () => {
    if (!txt.trim()) return;
    fbPush("questions", { text: txt.trim(), name: nm.trim()||"Anonymous", ts: Date.now(), votes: 0 });
    setTxt("");
  };
  const up = (key, cur) => {
    if (voted[key]) return;
    fbUpdate(`questions/${key}`, { votes: (cur||0) + 1 });
    const nv = { ...voted, [key]: true };
    setVoted(nv);
    try { localStorage.setItem("lc26_voted", JSON.stringify(nv)); } catch {}
  };
  const hasVoted = key => !!voted[key];

  const sorted = [...items].sort((a,b) => sort==="votes" ? (b.votes||0)-(a.votes||0) : b.ts-a.ts);

  return (
    <div>

        {sorted.map(it => {

          return (
            <div key={it._key} className="card-hover" style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",gap:10}}>

                onMouseLeave={e=>{if(!v){e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="var(--dim)";}}}>

        {photos.length===0 && <p style={{gridColumn:"1/-1",textAlign:"center",padding:28,color:"var(--mute)",fontStyle:"italic"}}>No photos yet!</p>}

            </div>

// ─── POLLS TAB ───
function PoTab({dm, admin}) {
  const raw = useFirebase("polls");
  const polls = toArr(raw);
  const [q, setQ] = useState(""); const [opts, setOpts] = useState(["","",""]);
  const [pollVotes, setPollVotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lc26_pollvotes") || "{}"); } catch { return {}; }
  });

  const create = () => {
    const valid = opts.filter(o => o.trim());
    if (!q.trim() || valid.length < 2) return;
    fbPush("polls", { q: q.trim(), opts: valid.map(o => ({t:o.trim(),v:0})), on: true, ts: Date.now() });
    setQ(""); setOpts(["","",""]);
  };
  const toggle = (key, cur) => fbUpdate(`polls/${key}`, { on: !cur });
  const vote = (key, opts, oi) => {
    if (pollVotes[key] !== undefined) return;
    const no = [...opts]; no[oi] = {...no[oi], v: no[oi].v + 1};
    fbUpdate(`polls/${key}`, { opts: no });
    const nv = { ...pollVotes, [key]: oi };
    setPollVotes(nv);
    try { localStorage.setItem("lc26_pollvotes", JSON.stringify(nv)); } catch {}
  };
  const hasVotedPoll = key => pollVotes[key] !== undefined;
  const votedOption = key => pollVotes[key];

  const act = polls.filter(p=>p.on), cls = polls.filter(p=>!p.on);

  return (
    <div style={{maxHeight:dm?"calc(100vh - 200px)":440,overflowY:"auto"}}>
      {admin && (
        <div style={{padding:20,borderBottom:"1px solid var(--border)",background:"var(--card)"}}>
          <div style={{fontSize:17,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Create Poll (Admin)</div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Question..." className="field" style={{marginBottom:6}} />
          {opts.map((o,i) => <input key={i} value={o} onChange={e=>{const n=[...opts];n[i]=e.target.value;setOpts(n);}} placeholder={`Option ${i+1}`} className="field" style={{marginBottom:3,fontSize:16,padding:7}} />)}
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <button onClick={() => setOpts([...opts,""])} className="btn-sm">+ Option</button>
            <button onClick={create} className="btn-gold" style={{padding:"5px 14px",fontSize:12}}>Create</button>
          </div>
        </div>
      )}
      {polls.length===0 && <p style={{textAlign:"center",padding:28,color:"var(--mute)",fontStyle:"italic"}}>No polls yet</p>}
      {[...act,...cls].map(p => {
        const total = p.opts.reduce((s,o) => s+o.v, 0);
        const voted = hasVotedPoll(p._key);
        const myChoice = votedOption(p._key);
        return (
          <div key={p._key} style={{padding:20,borderBottom:"1px solid var(--border)",opacity:p.on?1:.5}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
              <div style={{fontSize:dm?22:18,fontFamily:"var(--ff)",fontWeight:700}}>{p.q}</div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {p.on && !voted && <span style={{fontSize:12,padding:"1px 5px",borderRadius:6,background:"var(--red)",color:"#fff",fontWeight:700}}>LIVE</span>}
                {voted && <span style={{fontSize:13,padding:"2px 8px",borderRadius:6,background:"var(--glow)",border:"1px solid var(--goldDim)",color:"var(--gold)",fontWeight:600}}>✅ Voted</span>}
                {admin && <button onClick={() => toggle(p._key, p.on)} className="btn-sm">{p.on?"Close":"Open"}</button>}
              </div>
            </div>
            <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
              {p.opts.map((o,i) => {
                const pct = total>0 ? Math.round(o.v/total*100) : 0;
                const isMyChoice = voted && myChoice === i;
                return (
                  <button key={i} onClick={() => p.on && !voted && vote(p._key, p.opts, i)} disabled={!p.on || voted}
                    style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",
                      background:isMyChoice?"rgba(201,165,78,0.12)":"var(--input)",
                      border:isMyChoice?"1px solid var(--goldDim)":"1px solid var(--border)",
                      borderRadius:8,cursor:(!p.on||voted)?"default":"pointer",
                      position:"relative",overflow:"hidden",textAlign:"left",
                      transition:"all .3s"}}>
                    <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,background:isMyChoice?"rgba(201,165,78,0.2)":"var(--glow)",transition:"width .5s",borderRadius:8}} />
                    <span style={{position:"relative",flex:1,fontSize:16,fontWeight:isMyChoice?600:500,color:isMyChoice?"var(--gold)":"var(--txt)"}}>{isMyChoice && "✓ "}{o.t}</span>
                    <span style={{position:"relative",fontSize:19,color:"var(--gold)",fontWeight:700}}>{pct}%</span>
                    <span style={{position:"relative",fontSize:17,color:"var(--mute)"}}>{o.v}</span>
                  </button>
                );
              })}
            </div>
            <div style={{marginTop:4,fontSize:17,color:"var(--mute)"}}>{total} vote{total!==1?"s":""}</div>
          </div>
        );
      })}
    </div>
  );
}

  const rx = useFirebase("reactions") || {};
  const tk = toArr(useFirebase("takeaways"));

  const topQ = [...q].sort((a,b) => (b.votes||0)-(a.votes||0)).slice(0,10);
  const hs = {fontFamily:"var(--ff)",fontSize:19,color:"var(--gold)",fontWeight:700,marginBottom:6,borderBottom:"1px solid var(--border)",paddingBottom:4};
  const ts = {fontSize:17,lineHeight:1.6};

  const rxSum = [];
  AGENDA.forEach(day => day.ev.forEach((ev,i) => {
    const r = rx[`d${day.day}_${i}`];
    if(r) { const total = Object.values(r).reduce((s,v)=>s+v,0); if(total>0) rxSum.push({title:ev.n,day:day.day,...r,total}); }
  }));
  rxSum.sort((a,b) => b.total - a.total);

  return (
    <div style={{padding:20,maxHeight:dm?"calc(100vh - 180px)":500,overflowY:"auto"}}>
      <h2 style={{fontFamily:"var(--ff)",fontSize:28,color:"var(--gold)",fontWeight:800,margin:"0 0 16px"}}>📊 LC26 Summary</h2>
      <div style={{marginBottom:20}}><div style={hs}>Overview</div><div style={ts}>{q.length} questions · {c.length} shoutouts · {ph.length} photos · {po.length} polls · {tk.length} takeaways</div></div>
      <div style={{marginBottom:20}}><div style={hs}>Top Questions</div>
        {topQ.length===0 ? <div style={ts}>None</div> : topQ.map((q,i) => <div key={q._key} style={{...ts,padding:"2px 0"}}>{i+1}. {q.text} <span style={{color:"var(--gold)"}}>({q.votes} votes)</span> — {q.name}</div>)}
      </div>
      <div style={{marginBottom:20}}><div style={hs}>Session Engagement</div>
        {rxSum.length===0 ? <div style={ts}>None</div> : rxSum.slice(0,8).map((r,i) => <div key={i} style={{...ts,padding:"2px 0"}}>Day {r.day} — {r.title}: {EJ.map(em => r[em]?` ${em}${r[em]}`:"")} <span style={{color:"var(--gold)"}}>({r.total})</span></div>)}
      </div>
      <div style={{marginBottom:20}}><div style={hs}>Poll Results</div>
        {po.map(p => { const total=p.opts.reduce((s,o)=>s+o.v,0); return (
          <div key={p._key} style={{marginBottom:10}}>
            <div style={{...ts,fontWeight:600}}>{p.q} ({total} votes)</div>
            {p.opts.map((o,i) => <div key={i} style={{...ts,paddingLeft:12}}>{o.t}: {total>0?Math.round(o.v/total*100):0}% ({o.v})</div>)}
          </div>
        ); })}
      </div>
      {[1,2,3].map(d => { const dtk=tk.filter(t=>t.day===d); if(!dtk.length)return null; return (
        <div key={d} style={{marginBottom:20}}>
          <div style={hs}>Day {d} Takeaways ({dtk.length})</div>
          {dtk.map(t => <div key={t._key} style={{...ts,padding:"2px 0"}}>💡 {t.text} — {t.name}</div>)}
        </div>
      ); })}
    </div>
  );
}

// ─── ADMIN MODAL ───
function AdminModal({onClose}) {
  const [txt, setTxt] = useState("");
  const [confirmReset, setConfirmReset] = useState(false);
  const raw = useFirebase("announcements");
  const anns = toArr(raw).filter(a => a.on);

  const post = () => { if(!txt.trim())return; fbPush("announcements",{text:txt.trim(),on:true,ts:Date.now()}); setTxt(""); };
  const dismiss = key => fbUpdate(`announcements/${key}`, {on:false});

  const resetSection = (path, label) => {
    if (window.confirm(`Delete all ${label}? This cannot be undone.`)) {
      fbRemove(path);
    }
  };

  const resetAll = () => {
    if (window.confirm("⚠️ RESET EVERYTHING?\n\nThis will delete ALL questions, shoutouts, photos, polls, takeaways, reactions, announcements, and workshop responses.\n\nThis cannot be undone.")) {
      fbRemove("questions");
      fbRemove("comments");
      fbRemove("photos");
      fbRemove("polls");
      fbRemove("reactions");
      fbRemove("takeaways");
      fbRemove("announcements");
      fbRemove("workshop_responses");
      // Clear localStorage voting history too
      try {
        localStorage.removeItem("lc26_voted");
        localStorage.removeItem("lc26_reacted");
        localStorage.removeItem("lc26_pollvotes");
        localStorage.removeItem("lc26_team");
      } catch {}
      setConfirmReset(false);
      alert("All data has been reset.");
    }
  };

  const resetLocal = () => {
    try {
      localStorage.removeItem("lc26_voted");
      localStorage.removeItem("lc26_reacted");
      localStorage.removeItem("lc26_pollvotes");
      localStorage.removeItem("lc26_team");
    } catch {}
    alert("Your local history has been cleared. Refresh the page to see the effect.");
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <h2 style={{fontFamily:"var(--ff)",fontSize:22,color:"var(--gold)",fontWeight:700}}>⚙️ Admin</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--dim)",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {/* Announcements */}
        <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Post Announcement</div>
        <div style={{display:"flex",gap:6}}>
          <input value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Type announcement..." className="field" onKeyDown={e=>{if(e.key==="Enter")post();}} />
          <button onClick={post} className="btn-gold" style={{fontSize:14}}>Send</button>
        </div>
        {anns.map(a => (
          <div key={a._key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"var(--input)",borderRadius:6,marginTop:6}}>
            <span style={{fontSize:14}}>{a.text}</span>
            <button onClick={() => dismiss(a._key)} className="btn-sm">Dismiss</button>
          </div>
        ))}

        {/* Divider */}
        <div style={{borderTop:"1px solid var(--border)",margin:"20px 0"}} />

        {/* Reset by section */}
        <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Reset Data by Section</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {[
            {path:"questions",label:"Questions"},
            {path:"comments",label:"Shoutouts"},
            {path:"photos",label:"Photos"},
            {path:"polls",label:"Polls"},
            {path:"reactions",label:"Reactions"},
            {path:"takeaways",label:"Takeaways"},
            {path:"workshop_responses",label:"Workshop"},
            {path:"announcements",label:"Announcements"},
          ].map(s => (
            <button key={s.path} onClick={() => resetSection(s.path, s.label)} className="btn-sm" style={{color:"var(--red)",borderColor:"var(--red)",padding:"6px 12px",fontSize:13}}>
              🗑 {s.label}
            </button>
          ))}
        </div>

        {/* Reset local votes */}
        <button onClick={resetLocal} className="btn-sm" style={{padding:"8px 16px",fontSize:13,marginBottom:12,borderColor:"var(--goldDim)",color:"var(--goldDim)",width:"100%"}}>
          🔄 Clear My Vote History (this device only)
        </button>

        {/* Nuclear reset */}
        <div style={{borderTop:"1px solid var(--border)",margin:"12px 0"}} />
        <button onClick={resetAll} style={{width:"100%",padding:"12px 20px",background:"none",border:"2px solid var(--red)",borderRadius:10,color:"var(--red)",fontSize:16,fontFamily:"var(--ff)",fontWeight:700,cursor:"pointer",transition:"all .2s"}}
          onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,107,74,0.1)";}}
          onMouseLeave={e=>{e.currentTarget.style.background="none";}}>
          ⚠️ Reset ALL Data
        </button>
        <p style={{fontSize:12,color:"var(--mute)",textAlign:"center",marginTop:6}}>Deletes everything and clears your local vote history</p>
      </div>
    </div>
  );
}

// ─── WORKSHOP TAB ───
function WorkshopTab({dm, admin}) {
  const responsesRaw = useFirebase("workshop_responses");
  const responses = responsesRaw || {};

  const [teamId, setTeamId] = useState(() => {
    try { return localStorage.getItem("lc26_team") || ""; } catch { return ""; }
  });
  const [localAnswers, setLocalAnswers] = useState({});
  const [showChangeTeam, setShowChangeTeam] = useState(false);

  // Load existing team response on team select
  useEffect(() => {
    if (teamId && responses[teamId]) {
      const saved = responses[teamId];
      setLocalAnswers({
        a1: saved.a1 || "", a2: saved.a2 || "", a3: saved.a3 || "",
        a4: saved.a4 || "", a5: saved.a5 || ""
      });
    }
  }, [teamId, responsesRaw]);

  const team = TEAMS.find(t => t.id === teamId);
  const cs = team ? CASES[team.case] : null;
  const teamResp = teamId ? responses[teamId] : null;
  const isSubmitted = teamResp?.submitted;

  const pickTeam = (id) => {
    setTeamId(id);
    try { localStorage.setItem("lc26_team", id); } catch {}
    setShowChangeTeam(false);
  };

  const clearTeam = () => {
    setTeamId("");
    setLocalAnswers({});
    try { localStorage.removeItem("lc26_team"); } catch {}
  };

  const saveAnswer = (qIdx, text) => {
    const key = `a${qIdx+1}`;
    const newAns = {...localAnswers, [key]: text};
    setLocalAnswers(newAns);
    // Debounced auto-save
    fbUpdate(`workshop_responses/${teamId}`, {
      ...newAns,
      teamName: team.name,
      caseId: team.case,
      lastSaved: Date.now(),
    });
  };

  const submit = () => {
    if (!window.confirm("Submit your team's responses?\n\nYou can still edit and resubmit after this.")) return;
    fbUpdate(`workshop_responses/${teamId}`, {
      submitted: true,
      submittedAt: Date.now(),
    });
  };

  const editAgain = () => {
    if (!window.confirm("Edit your team's response?\n\nYou'll need to resubmit when done.")) return;
    fbUpdate(`workshop_responses/${teamId}`, { submitted: false });
  };

  const unlockForEdit = () => {
    if (!admin) return;
    if (window.confirm("Unlock this team's response for editing?")) {
      fbUpdate(`workshop_responses/${teamId}`, { submitted: false });
    }
  };

  // ADMIN: Export all responses
  const exportAll = () => {
    const lines = [];
    lines.push("═══════════════════════════════════════════════════════════════");
    lines.push("  LC26 WORKSHOP — TEAM RESPONSES FOR GRADING");
    lines.push("═══════════════════════════════════════════════════════════════\n");
    TEAMS.forEach(t => {
      const r = responses[t.id];
      const c = CASES[t.case];
      lines.push(`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
      lines.push(`TEAM: ${t.name}`);
      lines.push(`CASE: ${c.title}`);
      lines.push(`STATUS: ${r?.submitted ? "✓ Submitted" : r ? "In Progress" : "Not Started"}`);
      if (r?.submittedAt) lines.push(`SUBMITTED: ${new Date(r.submittedAt).toLocaleString()}`);
      lines.push(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`);
      c.questions.forEach((q, i) => {
        lines.push(`QUESTION ${i+1}: ${q.title}`);
        lines.push(`${q.text}\n`);
        lines.push(`ANSWER:`);
        lines.push(`${(r && r[`a${i+1}`]) || "(no response)"}\n`);
      });
    });
    const blob = new Blob([lines.join("\n")], {type:"text/plain"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `lc26-workshop-responses-${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  };

  // ── No team selected: show picker ──
  if (!teamId || showChangeTeam) {
    return (
      <div style={{padding:"24px 20px",maxHeight:dm?"calc(100vh - 180px)":"auto",overflowY:"auto"}}>
        {admin && (
          <div style={{marginBottom:24,padding:16,background:"var(--card)",border:"1px solid var(--border)",borderRadius:12}}>
            <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Admin — Team Status</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:8,marginBottom:12}}>
              {TEAMS.map(t => {
                const r = responses[t.id];
                const done = r?.submitted;
                const started = r && Object.keys(r).some(k=>k.startsWith("a") && r[k]?.trim());
                let count = 0;
                if (r) for (let i=1;i<=5;i++) if (r[`a${i}`]?.trim()) count++;
                return (
                  <div key={t.id} style={{padding:10,background:"var(--input)",borderRadius:8,border:`1px solid ${done?"var(--gold)":started?"var(--goldDim)":"var(--border)"}`}}>
                    <div style={{fontFamily:"var(--ff)",fontSize:15,fontWeight:700,color:"var(--gold)"}}>{t.name}</div>
                    <div style={{fontSize:12,color:"var(--dim)"}}>{CASES[t.case].title.replace("Public Club — ","")}</div>
                    <div style={{fontSize:12,color:done?"var(--gold)":"var(--dim)",marginTop:4,fontWeight:600}}>
                      {done ? "✓ Submitted" : `${count}/5 answered`}
                    </div>
                  </div>
                );
              })}
            </div>
            <button onClick={exportAll} className="btn-gold" style={{fontSize:14}}>📊 Export All for Grading</button>
          </div>
        )}
        <div style={{textAlign:"center",padding:"24px 16px"}}>
          <div style={{fontSize:40,marginBottom:12}}>🎓</div>
          <h2 style={{fontFamily:"var(--ff)",fontSize:26,color:"var(--gold)",fontWeight:700,marginBottom:8}}>Case Workshop</h2>
          <p style={{fontSize:16,color:"var(--dim)",marginBottom:24,maxWidth:480,margin:"0 auto 24px"}}>
            Select your team to view your assigned case study and submit responses.
          </p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,maxWidth:520,margin:"0 auto"}}>
            {TEAMS.map(t => {
              const r = responses[t.id];
              const done = r?.submitted;
              return (
                <button key={t.id} onClick={() => pickTeam(t.id)}
                  style={{padding:"16px 20px",background:done?"rgba(201,165,78,0.1)":"var(--card)",
                    border:`2px solid ${done?"var(--goldDim)":"var(--border)"}`,
                    borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.transform="translateY(-2px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=done?"var(--goldDim)":"var(--border)";e.currentTarget.style.transform="translateY(0)";}}>
                  <div style={{fontFamily:"var(--ff)",fontSize:20,fontWeight:700,color:"var(--gold)"}}>{t.name}</div>
                  <div style={{fontSize:13,color:"var(--dim)",marginTop:4}}>{CASES[t.case].title.split("—")[1].trim()}</div>
                  {done && <div style={{fontSize:12,color:"var(--gold)",marginTop:6,fontWeight:600}}>✓ Submitted</div>}
                </button>
              );
            })}
          </div>
          {showChangeTeam && (
            <button onClick={() => setShowChangeTeam(false)} className="btn-sm" style={{marginTop:20}}>Cancel</button>
          )}
        </div>
      </div>
    );
  }

  // ── Team selected: show case + response form ──
  return (
    <div style={{maxHeight:dm?"calc(100vh - 180px)":"auto",overflowY:"auto"}}>
      {/* Team header */}
      <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",background:"var(--card)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:12,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Current Team</div>
          <div style={{fontFamily:"var(--ff)",fontSize:22,color:"var(--gold)",fontWeight:700}}>{team.name}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {isSubmitted && <span style={{padding:"4px 10px",background:"var(--glow)",border:"1px solid var(--gold)",borderRadius:8,color:"var(--gold)",fontSize:13,fontWeight:600}}>✓ Submitted</span>}
          <button onClick={() => setShowChangeTeam(true)} className="btn-sm">Change Team</button>
          {admin && isSubmitted && <button onClick={unlockForEdit} className="btn-sm" style={{borderColor:"var(--red)",color:"var(--red)"}}>Unlock</button>}
        </div>
      </div>

      {/* Case context */}
      <div style={{padding:"20px",borderBottom:"1px solid var(--border)"}}>
        <h2 style={{fontFamily:"var(--ff)",fontSize:24,color:"var(--gold)",fontWeight:700,marginBottom:4}}>{cs.title}</h2>
        <div style={{fontSize:14,color:"var(--goldDim)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>{cs.subtitle}</div>
        <p style={{fontSize:16,color:"var(--txt)",lineHeight:1.6}}>{cs.context}</p>
      </div>

      {/* Key stats table */}
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>📊 Key Performance Data — March 2026</div>
        <div style={{background:"var(--input)",borderRadius:10,overflow:"hidden",border:"1px solid var(--border)"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:0,background:"var(--card)",padding:"10px 14px",fontSize:12,fontWeight:600,color:"var(--goldDim)",textTransform:"uppercase",letterSpacing:1,borderBottom:"1px solid var(--border)"}}>
            <div>Metric</div><div style={{textAlign:"right"}}>Actual</div><div style={{textAlign:"right"}}>Budget/Fcst</div><div style={{textAlign:"right"}}>Variance</div>
          </div>
          {cs.keyStats.map((s,i) => (
            <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:0,padding:"8px 14px",fontSize:14,borderBottom:i<cs.keyStats.length-1?"1px solid var(--border)":"none"}}>
              <div style={{color:"var(--txt)",fontWeight:s.label.startsWith("  ")?400:500}}>{s.label}</div>
              <div style={{textAlign:"right",color:"var(--txt)",fontVariantNumeric:"tabular-nums"}}>{s.actual}</div>
              <div style={{textAlign:"right",color:"var(--dim)",fontVariantNumeric:"tabular-nums"}}>{s.budget}</div>
              <div style={{textAlign:"right",fontWeight:600,fontVariantNumeric:"tabular-nums",color:s.delta.startsWith("+")&&!s.delta.includes("✓")?"var(--gold)":s.delta.startsWith("-")&&!s.delta.includes("✓")?"var(--red)":"var(--goldDim)"}}>{s.delta}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Questions + answers */}
      <div style={{padding:"20px"}}>
        <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>📝 Your Responses</div>
        {!isSubmitted && <p style={{fontSize:13,color:"var(--dim)",marginBottom:16,fontStyle:"italic"}}>Answers auto-save as you type. Submit when your team is ready — you can still edit and resubmit after.</p>}

        {cs.questions.map((q, i) => (
          <div key={i} style={{marginBottom:24,padding:16,background:"var(--card)",borderRadius:12,border:"1px solid var(--border)"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
              <div style={{background:"var(--gold)",color:"var(--bg)",width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0,fontSize:14}}>{i+1}</div>
              <div>
                <div style={{fontFamily:"var(--ff)",fontSize:17,color:"var(--gold)",fontWeight:700,marginBottom:4}}>{q.title}</div>
                <div style={{fontSize:15,color:"var(--txt)",lineHeight:1.55}}>{q.text}</div>
              </div>
            </div>
            <textarea
              value={localAnswers[`a${i+1}`] || ""}
              onChange={e => saveAnswer(i, e.target.value)}
              disabled={isSubmitted}
              placeholder="Type your team's response here..."
              rows={6}
              className="field"
              style={{resize:"vertical",marginTop:10,minHeight:120,opacity:isSubmitted?0.7:1,cursor:isSubmitted?"not-allowed":"text"}}
            />
            {localAnswers[`a${i+1}`] && (
              <div style={{fontSize:11,color:"var(--mute)",marginTop:4,textAlign:"right"}}>
                {localAnswers[`a${i+1}`].length} characters · auto-saved
              </div>
            )}
          </div>
        ))}

        {/* Submit / Edit block */}
        <div style={{marginTop:24,padding:"20px",background:"var(--card)",borderRadius:12,border:`2px solid ${isSubmitted?"var(--gold)":"var(--border)"}`,textAlign:"center"}}>
          {isSubmitted ? (
            <div>
              <div style={{fontSize:32,marginBottom:8}}>✅</div>
              <div style={{fontFamily:"var(--ff)",fontSize:20,color:"var(--gold)",fontWeight:700,marginBottom:4}}>Responses Submitted</div>
              <div style={{fontSize:13,color:"var(--dim)",marginBottom:16}}>
                Submitted {teamResp?.submittedAt ? new Date(teamResp.submittedAt).toLocaleString() : "recently"}
              </div>
              <button onClick={editAgain} className="btn-sm" style={{padding:"10px 24px",fontSize:14,borderColor:"var(--gold)",color:"var(--gold)"}}>
                ✏️ Edit & Resubmit
              </button>
              <div style={{fontSize:11,color:"var(--mute)",marginTop:10,fontStyle:"italic"}}>
                Unlocks the form so your team can revise and resubmit
              </div>
            </div>
          ) : (
            <>
              <p style={{fontSize:14,color:"var(--dim)",marginBottom:14}}>
                Review your responses above, then submit when your team agrees on final answers.
              </p>
              <button onClick={submit} className="btn-gold" style={{fontSize:17,padding:"14px 36px"}}>
                🎯 Submit {teamResp?.submittedAt ? "Updated" : ""} Responses
              </button>
              {teamResp?.submittedAt && (
                <div style={{fontSize:12,color:"var(--mute)",marginTop:8}}>
                  Previously submitted {new Date(teamResp.submittedAt).toLocaleString()}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function Welcome({onEnter}) {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 24px",textAlign:"center",minHeight:"100vh",background:`radial-gradient(ellipse at 50% 30%, #1a2e1f 0%, var(--bg) 70%)`}}>
      <div style={{fontSize:16,letterSpacing:6,textTransform:"uppercase",color:"var(--goldDim)",fontWeight:600,marginBottom:16}}>Century Golf Partners</div>
      <h1 style={{fontFamily:"var(--ff)",fontWeight:800,fontSize:52,color:"var(--gold)",lineHeight:1.1,marginBottom:8,textShadow:"0 2px 40px rgba(201,165,78,.2)"}}>LC26 Live Wall</h1>
      <p style={{fontFamily:"var(--ff)",fontStyle:"italic",fontSize:22,color:"var(--dim)",marginBottom:28}}>Back to the Basics — Past · Present · People</p>
      {CONF_START > Date.now() && <Countdown />}
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:20,padding:28,marginBottom:28,boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
        <QRCode size={220} />
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginBottom:28}}>
        {["📋 Agenda","💬 Q&A","🎉 Shoutouts","📸 Photos","📊 Polls","💡 Takeaways","🎓 Workshop"].map(x => (
          <span key={x} style={{padding:"8px 18px",borderRadius:20,background:"var(--glow)",border:"1px solid var(--border)",fontSize:16,fontWeight:500}}>{x}</span>
        ))}
      </div>
      <button onClick={onEnter} className="btn-gold" style={{padding:"18px 48px",fontSize:22,borderRadius:14}}>Enter the Wall →</button>
      <p style={{marginTop:32,fontSize:15,color:"var(--mute)",letterSpacing:2}}>April 27–30, 2026 · Dallas, TX</p>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [scr, setScr] = useState("welcome");
  const [tab, setTab] = useState("agenda");
  const [dm, setDm] = useState(false);
  const [admin, setAdmin] = useState(false);
  const [showAdm, setShowAdm] = useState(false);
  const [showExp, setShowExp] = useState(false);
  const [pin, setPin] = useState(""); const [showPin, setShowPin] = useState(false);

  // Live counts from Firebase
  const qRaw = useFirebase("questions");
  const cRaw = useFirebase("comments");
  const phRaw = useFirebase("photos");
  const poRaw = useFirebase("polls");
  const tkRaw = useFirebase("takeaways");

  const cnt = {
    q: toArr(qRaw).length,
    c: toArr(cRaw).length,
    p: toArr(phRaw).length,
    po: toArr(poRaw).filter(p=>p.on).length,
    tk: toArr(tkRaw).length,
  };

  const tryPin = () => { if(pin===ADMIN_PIN){setAdmin(true);setShowPin(false);setPin("");}else setPin(""); };

  const tabs = [
    {id:"agenda",label:"Agenda",icon:"📋",count:0},
    {id:"questions",label:"Q&A",icon:"💬",count:cnt.q},
    {id:"comments",label:"Shoutouts",icon:"🎉",count:cnt.c},
    {id:"photos",label:"Photos",icon:"📸",count:cnt.p},
    {id:"polls",label:"Polls",icon:"📊",count:cnt.po},
    {id:"takeaways",label:"Takeaways",icon:"💡",count:cnt.tk},
    {id:"workshop",label:"Workshop",icon:"🎓",count:0},
  ];

  if (scr==="welcome") return <Welcome onEnter={() => setScr("main")} />;

  return (
    <div className={dm?"dm":""}>
      {/* Header */}
      <div style={{padding:"16px 24px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--card)",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <h1 style={{fontFamily:"var(--ff)",fontWeight:700,fontSize:dm?32:24,color:"var(--gold)"}}> LC26 Live Wall</h1>
          <span style={{fontSize:13,color:"var(--mute)",letterSpacing:3,textTransform:"uppercase"}}>CGP</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={() => setScr("welcome")} className="btn-sm">QR</button>
          <button onClick={() => setDm(!dm)} className={`btn-sm ${dm?"active":""}`}>{dm?"✦ Display":"Display"}</button>
          {admin ? (<>
            <button onClick={() => setShowAdm(true)} className="btn-sm" style={{borderColor:"var(--red)",color:"var(--red)"}}>⚙️</button>
            <button onClick={() => setShowExp(!showExp)} className="btn-sm" style={{borderColor:"var(--goldDim)",color:"var(--goldDim)"}}>📊</button>
          </>) : (
            <button onClick={() => setShowPin(true)} className="btn-sm">⚙️</button>
          )}
        </div>
      </div>

      <AnnBanner />

      {!showExp && (
        <div style={{display:"flex",gap:2,borderBottom:"1px solid var(--border)",padding:"0 6px",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`tab-btn ${tab===t.id?"active":""}`}>
              {t.icon} {t.label}
              {t.count>0 && <span className="tab-count" style={{background:tab===t.id?"var(--gold)":"var(--border)",color:tab===t.id?"var(--bg)":"var(--dim)"}}>{t.count}</span>}
            </button>
          ))}
        </div>
      )}

      <div style={{animation:"fadeIn .3s"}}>
        {showExp ? <ExportTab dm={dm} /> : (<>
          {tab==="agenda" && <AgendaTab dm={dm} />}
          {tab==="questions" && <QTab dm={dm} />}
          {tab==="comments" && <CTab dm={dm} />}
          {tab==="photos" && <PTab dm={dm} admin={admin} />}
          {tab==="polls" && <PoTab dm={dm} admin={admin} />}
          {tab==="takeaways" && <TkTab dm={dm} />}
          {tab==="workshop" && <WorkshopTab dm={dm} admin={admin} />}
        </>)}
      </div>

      {showAdm && <AdminModal onClose={() => setShowAdm(false)} />}

      {showPin && (
        <div className="overlay" onClick={() => {setShowPin(false);setPin("");}}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:260,textAlign:"center"}}>
            <div style={{fontFamily:"var(--ff)",fontSize:19,color:"var(--gold)",fontWeight:700,marginBottom:12}}>Admin Access</div>
            <input value={pin} onChange={e=>setPin(e.target.value)} type="password" maxLength={4} placeholder="PIN"
              className="field" style={{width:100,fontSize:22,textAlign:"center",letterSpacing:6,display:"inline-block"}}
              onKeyDown={e=>{if(e.key==="Enter")tryPin();}} autoFocus />
            <div style={{marginTop:12,display:"flex",gap:6,justifyContent:"center"}}>
              <button onClick={() => {setShowPin(false);setPin("");}} className="btn-sm" style={{padding:"6px 12px"}}>Cancel</button>
              <button onClick={tryPin} className="btn-gold" style={{padding:"6px 14px",fontSize:12}}>Unlock</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
