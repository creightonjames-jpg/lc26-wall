button{font-family:var(--fs);cursor:pointer}
input,textarea{font-family:var(--fs)}

/* Tabs — big, tappable */
.tab-btn{padding:14px 20px;background:none;border:none;font-family:var(--ff);font-size:17px;font-weight:400;white-space:nowrap;border-bottom:4px solid transparent;transition:all .3s;color:var(--dim);letter-spacing:.3px}
.tab-btn.active{color:var(--gold);font-weight:700;border-bottom-color:var(--gold);text-shadow:0 0 20px rgba(201,165,78,.2)}
.tab-count{margin-left:6px;padding:3px 9px;border-radius:12px;font-size:13px;font-family:var(--fs);font-weight:700}

/* Fields — big touch targets */
.field{padding:14px 16px;background:var(--input);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-size:17px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.field:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,165,78,.15)}

/* Gold button — prominent CTA */
.btn-gold{padding:14px 28px;background:linear-gradient(135deg,var(--gold),var(--goldDim));color:var(--bg);border:none;border-radius:10px;font-family:var(--ff);font-weight:700;font-size:17px;white-space:nowrap;box-shadow:0 4px 20px var(--glow);transition:transform .2s,box-shadow .2s;letter-spacing:.3px}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,165,78,.3)}
.btn-gold:active{transform:scale(.97)}

/* Small buttons */
.btn-sm{padding:6px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:14px;transition:all .2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm.active{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600}

/* Pills */
.pill{padding:6px 16px;border-radius:16px;border:1px solid var(--border);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:var(--dim)}
.pill.active{background:var(--glow);border-color:var(--goldDim);color:var(--gold);font-weight:600}

/* Emoji reactions — bigger tap target */
.emoji-btn{padding:5px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:18px;display:inline-flex;align-items:center;gap:4px;color:var(--dim);transition:all .15s}
.emoji-btn:hover{border-color:var(--gold);transform:scale(1.1)}
.emoji-btn:active{transform:scale(.95)}
.emoji-btn.has{background:var(--glow);border-color:var(--goldDim)}

/* Cards */
.card-hover{transition:background .2s}
.card-hover:hover{background:var(--glow)}

/* Overlays */
.overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s;backdrop-filter:blur(4px)}

const db = firebase.database();

function useFirebase(path) {
  const [data, setData] = useState(null);
  useEffect(() => {
    const ref = db.ref(path);
    const handler = ref.on('value', snap => {
      setData(snap.val());
    });
    return () => ref.off('value', handler);
  }, [path]);
  return data;
}

function fbPush(path, val) { return db.ref(path).push(val); }
function fbSet(path, val) { return db.ref(path).set(val); }
function fbUpdate(path, val) { return db.ref(path).update(val); }
function fbRemove(path) { return db.ref(path).remove(); }

// Convert Firebase object to array with keys
function toArr(obj) {
  if (!obj) return [];
  return Object.entries(obj).map(([k, v]) => ({ ...v, _key: k }));
}

const ago = ts => { const m=Math.floor((Date.now()-ts)/60000); if(m<1)return"now"; if(m<60)return m+"m"; const h=Math.floor(m/60); return h<24?h+"h":Math.floor(h/24)+"d"; };

function compress(file, maxW=800, q=0.6) {
  return new Promise(r => {
    const rd = new FileReader();
    rd.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        const ratio = Math.min(maxW/img.width, maxW/img.height, 1);
        c.width = img.width*ratio; c.height = img.height*ratio;
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        r(c.toDataURL("image/jpeg", q));
      };
      img.src = ev.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// ─── Countdown ───
function Countdown() {
  const [d, setD] = useState(CONF_START - Date.now());
  useEffect(() => { const iv = setInterval(() => setD(CONF_START - Date.now()), 1000); return () => clearInterval(iv); }, []);
  if (d <= 0) return null;
  const days=Math.floor(d/864e5), hrs=Math.floor((d%864e5)/36e5), mins=Math.floor((d%36e5)/6e4), secs=Math.floor((d%6e4)/1e3);
  return (
    <div style={{display:"flex",gap:16,justifyContent:"center",margin:"18px 0"}}>
      {[{v:days,l:"Days"},{v:hrs,l:"Hrs"},{v:mins,l:"Min"},{v:secs,l:"Sec"}].map(u=>(
        <div key={u.l} style={{textAlign:"center"}}>
          <div style={{fontFamily:"var(--ff)",fontSize:42,fontWeight:800,color:"var(--gold)"}}>{String(u.v).padStart(2,"0")}</div>
          <div style={{fontSize:17,color:"var(--mute)",textTransform:"uppercase",letterSpacing:2}}>{u.l}</div>

      ))}
    </div>
  );
}

// ─── AGENDA TAB ───
function AgendaTab({dm}) {
  const [now, setNow] = useState(new Date());
  const [day, setDay] = useState(null);
  const rxRaw = useFirebase("reactions");
  const rx = rxRaw || {};
  const [reacted, setReacted] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lc26_reacted") || "{}"); } catch { return {}; }
  });

  useEffect(() => { const iv = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(iv); }, []);
  useEffect(() => {
    if (day !== null) return;
    const td = now.toISOString().slice(0,10);
    const m = AGENDA.find(d => d.date===td) || AGENDA.find(d => d.date>td) || AGENDA[AGENDA.length-1];
    setDay(m.day);
  }, [now, day]);

  const dd = AGENDA.find(d => d.day===day) || AGENDA[0];

  const hasReacted = (ek, em) => !!(reacted[ek] && reacted[ek][em]);

  const react = (ek, em) => {
    if (hasReacted(ek, em)) return;
    const cur = (rx[ek] && rx[ek][em]) || 0;
    fbUpdate(`reactions/${ek}`, { [em]: cur + 1 });
    const nr = { ...reacted };
    if (!nr[ek]) nr[ek] = {};
    nr[ek][em] = true;
    setReacted(nr);
    try { localStorage.setItem("lc26_reacted", JSON.stringify(nr)); } catch {}
  };

  let cur=null, nxt=null;
  for (const d of AGENDA) { for (const ev of d.ev) {
    const s=pt(d.date,ev.t), e=pt(d.date,ev.e);
    if(now>=s&&now<e&&!cur) cur={...ev,dl:d.label};
    if(s>now&&!nxt) nxt={...ev,dl:d.label};
    if(cur&&nxt)break;
  } if(cur&&nxt)break; }

  return (
    <div>
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",background:"rgba(255,107,74,0.05)"}}>
        {cur ? (
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:9,height:9,borderRadius:"50%",background:"var(--red)",boxShadow:"0 0 8px var(--red)",animation:"pulse 2s infinite",display:"inline-block"}} />
            <div>
              <div style={{fontSize:17,color:"var(--red)",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5}}>Happening Now</div>
              <div style={{fontSize:dm?22:18,fontFamily:"var(--ff)",color:"var(--txt)",fontWeight:700}}>{cur.i} {cur.n}</div>
              {cur.d && <div style={{fontSize:19,color:"var(--dim)"}}>{cur.d}</div>}
            </div>
          </div>
        ) : nxt ? (
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:15}}>⏳</span>
            <div>
              <div style={{fontSize:17,color:"var(--goldDim)",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5}}>Up Next</div>
              <div style={{fontSize:dm?22:18,fontFamily:"var(--ff)",color:"var(--txt)",fontWeight:700}}>{nxt.i} {nxt.n}</div>
              <div style={{fontSize:19,color:"var(--dim)"}}>{f12(nxt.t)} · {nxt.dl}</div>
            </div>
          </div>
        ) : <div style={{fontSize:17,color:"var(--dim)",fontStyle:"italic"}}>Conference complete — thank you!</div>}
      </div>

      <div style={{display:"flex",gap:5,padding:"12px 20px",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {AGENDA.map(d => (
          <button key={d.day} onClick={() => setDay(d.day)} className={`pill ${d.day===day?"active":""}`} style={{position:"relative"}}>
            Day {d.day}{dm ? ` — ${d.title}` : ""}
            {d.date===now.toISOString().slice(0,10) && <span style={{position:"absolute",top:-3,right:-3,width:6,height:6,borderRadius:"50%",background:"var(--red)"}} />}
          </button>
        ))}
      </div>

      <div style={{padding:"12px 20px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontFamily:"var(--ff)",fontSize:dm?24:18,color:"var(--gold)",fontWeight:700}}>{dd.label}</div>
        <div style={{fontSize:18,color:"var(--dim)"}}>📍 {dd.loc} · 🎯 {dd.title}</div>
      </div>

      <div style={{maxHeight:dm?"calc(100vh - 360px)":340,overflowY:"auto",padding:"4px 12px 12px"}}>
        {dd.ev.map((ev, i) => {
          const s=pt(dd.date,ev.t), e=pt(dd.date,ev.e);
          const isA=now>=s&&now<e, isP=now>=e;
          const ek=`d${dd.day}_${i}`;
          return (
            <div key={i} style={{display:"flex",gap:9,padding:"7px 0",opacity:isP?.4:1,animation:"fadeIn .4s"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:26,flexShrink:0}}>
                <div style={{width:isA?12:8,height:isA?12:8,borderRadius:"50%",background:isA?"var(--red)":isP?"var(--mute)":"var(--goldDim)",boxShadow:isA?"0 0 10px var(--red)":"none",zIndex:1,flexShrink:0}} />
                {i<dd.ev.length-1 && <div style={{width:2,flex:1,marginTop:2,background:"var(--border)"}} />}
              </div>
              <div style={{flex:1,background:isA?"rgba(255,107,74,0.08)":"transparent",border:isA?"1px solid rgba(255,107,74,0.25)":"1px solid transparent",borderRadius:9,padding:isA?9:"2px 0"}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:19,color:isA?"var(--red)":isP?"var(--mute)":"var(--goldDim)",fontWeight:600}}>{f12(ev.t)}</span>
                  {isA && <span style={{fontSize:12,padding:"1px 5px",borderRadius:7,background:"var(--red)",color:"#fff",fontWeight:700,letterSpacing:1,animation:"pulse 2s infinite"}}>LIVE</span>}
                </div>
                <div style={{fontSize:dm?20:17,fontFamily:"var(--ff)",color:isP?"var(--mute)":"var(--txt)",fontWeight:isA?700:600,marginTop:2}}>{ev.i} {ev.n}</div>
                {ev.d && <div style={{fontSize:18,color:isA?"var(--dim)":"var(--mute)",marginTop:1}}>{ev.d}</div>}
                <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                  {EJ.map(em => {
                    const cnt = (rx[ek] && rx[ek][em]) || 0;
                    const did = hasReacted(ek, em);
                    return <button key={em} onClick={() => react(ek,em)} className={`emoji-btn ${cnt>0?"has":""}`} style={did?{background:"var(--glow)",borderColor:"var(--goldDim)",cursor:"default",opacity:.85}:{}}>{em}{cnt>0 && <span style={{fontSize:17,fontWeight:600,color:"var(--gold)"}}>{cnt}</span>}</button>;
                  })}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function QTab({dm}) {
  const raw = useFirebase("questions");
  const items = toArr(raw);
  const [sort, setSort] = useState("votes");
  const [txt, setTxt] = useState(""); const [nm, setNm] = useState("");
  const [voted, setVoted] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lc26_voted") || "{}"); } catch { return {}; }
  });

  const sub = () => {
    if (!txt.trim()) return;
    fbPush("questions", { text: txt.trim(), name: nm.trim()||"Anonymous", ts: Date.now(), votes: 0 });
    setTxt("");
  };
  const up = (key, cur) => {
    if (voted[key]) return;
    fbUpdate(`questions/${key}`, { votes: (cur||0) + 1 });
    const nv = { ...voted, [key]: true };
    setVoted(nv);
    try { localStorage.setItem("lc26_voted", JSON.stringify(nv)); } catch {}
  };
  const hasVoted = key => !!voted[key];

  const sorted = [...items].sort((a,b) => sort==="votes" ? (b.votes||0)-(a.votes||0) : b.ts-a.ts);

  return (
    <div>
      {!dm && (
        <div style={{padding:20,borderBottom:"1px solid var(--border)"}}>

        {sorted.length===0 && <p style={{textAlign:"center",padding:28,color:"var(--mute)",fontStyle:"italic"}}>No questions yet — be the first!</p>}
        {sorted.map(it => {
          const v = hasVoted(it._key);
          return (
            <div key={it._key} className="card-hover" style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",gap:10}}>
              <button onClick={() => up(it._key, it.votes)}

                onMouseEnter={e=>{if(!v){e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.color="var(--gold)";}}}
                onMouseLeave={e=>{if(!v){e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="var(--dim)";}}}>
                <span style={{fontSize:14}}>{v ? "✅" : "👍"}</span>

function PTab({dm, admin}) {
  const raw = useFirebase("photos");

  const [cap, setCap] = useState(""); const [nm, setNm] = useState(""); const [vp, setVp] = useState(null);
  const fr = useRef();

  const upload = async e => {
    const f = e.target.files?.[0]; if(!f) return;
    setUploading(true);
    try {
      const data = await compress(f);
      fbPush("photos", { data, caption: cap.trim(), name: nm.trim()||"Anonymous", ts: Date.now() });
      setCap(""); fr.current.value = "";
    } catch(err) { console.error(err); }
    setUploading(false);
  };

  const deletePhoto = (key) => {
    if (window.confirm("Delete this photo?")) {
      fbRemove(`photos/${key}`);
      setVp(null);
    }

  const downloadPhoto = (photo) => {
    const link = document.createElement("a");
    link.href = photo.data;
    link.download = `lc26-photo-${photo.name.replace(/\s+/g,"-")}-${new Date(photo.ts).toISOString().slice(0,10)}.jpg`;
    document.body.appendChild(link);
    link.click();

  return (
    <div>
      {!dm && (
        <div style={{padding:20,borderBottom:"1px solid var(--border)"}}>

          </div>
          <input ref={fr} type="file" accept="image/*" capture="environment" onChange={upload} style={{display:"none"}} />
          <button onClick={() => fr.current?.click()} disabled={uploading} className="btn-gold" style={{opacity:uploading?.6:1}}>

        {photos.length===0 && <p style={{gridColumn:"1/-1",textAlign:"center",padding:28,color:"var(--mute)",fontStyle:"italic"}}>No photos yet!</p>}

          <div key={p._key} onClick={() => setVp(p)} style={{borderRadius:8,overflow:"hidden",cursor:"pointer",border:"1px solid var(--border)",background:"var(--input)",transition:"transform .2s"}}
            onMouseEnter={e=>e.currentTarget.style.transform="scale(1.03)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
            <img src={p.data} alt="" style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} />
            <div style={{padding:"5px 7px"}}>
              {p.caption && <div style={{fontSize:19,color:"var(--txt)"}}>{p.caption}</div>}

            </div>
          </div>
        ))}

      {vp && (
        <div className="overlay" onClick={() => setVp(null)}>

            <div style={{marginTop:8,color:"var(--txt)"}}>{vp.caption && <p style={{fontSize:18}}>{vp.caption}</p>}<p style={{fontSize:15,color:"var(--dim)",margin:"4px 0 0"}}>{vp.name} · {ago(vp.ts)}</p></div>

// ─── POLLS TAB ───
function PoTab({dm, admin}) {
  const raw = useFirebase("polls");
  const polls = toArr(raw);
  const [q, setQ] = useState(""); const [opts, setOpts] = useState(["","",""]);
  const [pollVotes, setPollVotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lc26_pollvotes") || "{}"); } catch { return {}; }
  });

  const create = () => {
    const valid = opts.filter(o => o.trim());
    if (!q.trim() || valid.length < 2) return;
    fbPush("polls", { q: q.trim(), opts: valid.map(o => ({t:o.trim(),v:0})), on: true, ts: Date.now() });
    setQ(""); setOpts(["","",""]);
  };
  const toggle = (key, cur) => fbUpdate(`polls/${key}`, { on: !cur });
  const vote = (key, opts, oi) => {
    if (pollVotes[key] !== undefined) return;
    const no = [...opts]; no[oi] = {...no[oi], v: no[oi].v + 1};
    fbUpdate(`polls/${key}`, { opts: no });
    const nv = { ...pollVotes, [key]: oi };
    setPollVotes(nv);
    try { localStorage.setItem("lc26_pollvotes", JSON.stringify(nv)); } catch {}
  };
  const hasVotedPoll = key => pollVotes[key] !== undefined;
  const votedOption = key => pollVotes[key];

  const act = polls.filter(p=>p.on), cls = polls.filter(p=>!p.on);

  return (
    <div style={{maxHeight:dm?"calc(100vh - 200px)":440,overflowY:"auto"}}>
      {admin && (
        <div style={{padding:20,borderBottom:"1px solid var(--border)",background:"var(--card)"}}>
          <div style={{fontSize:17,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Create Poll (Admin)</div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Question..." className="field" style={{marginBottom:6}} />
          {opts.map((o,i) => <input key={i} value={o} onChange={e=>{const n=[...opts];n[i]=e.target.value;setOpts(n);}} placeholder={`Option ${i+1}`} className="field" style={{marginBottom:3,fontSize:16,padding:7}} />)}
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <button onClick={() => setOpts([...opts,""])} className="btn-sm">+ Option</button>
            <button onClick={create} className="btn-gold" style={{padding:"5px 14px",fontSize:12}}>Create</button>
          </div>
        </div>
      )}
      {polls.length===0 && <p style={{textAlign:"center",padding:28,color:"var(--mute)",fontStyle:"italic"}}>No polls yet</p>}
      {[...act,...cls].map(p => {
        const total = p.opts.reduce((s,o) => s+o.v, 0);
        const voted = hasVotedPoll(p._key);
        const myChoice = votedOption(p._key);
        return (
          <div key={p._key} style={{padding:20,borderBottom:"1px solid var(--border)",opacity:p.on?1:.5}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
              <div style={{fontSize:dm?22:18,fontFamily:"var(--ff)",fontWeight:700}}>{p.q}</div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {p.on && !voted && <span style={{fontSize:12,padding:"1px 5px",borderRadius:6,background:"var(--red)",color:"#fff",fontWeight:700}}>LIVE</span>}
                {voted && <span style={{fontSize:13,padding:"2px 8px",borderRadius:6,background:"var(--glow)",border:"1px solid var(--goldDim)",color:"var(--gold)",fontWeight:600}}>✅ Voted</span>}
                {admin && <button onClick={() => toggle(p._key, p.on)} className="btn-sm">{p.on?"Close":"Open"}</button>}
              </div>
            </div>
            <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
              {p.opts.map((o,i) => {
                const pct = total>0 ? Math.round(o.v/total*100) : 0;
                const isMyChoice = voted && myChoice === i;
                return (
                  <button key={i} onClick={() => p.on && !voted && vote(p._key, p.opts, i)} disabled={!p.on || voted}
                    style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",
                      background:isMyChoice?"rgba(201,165,78,0.12)":"var(--input)",
                      border:isMyChoice?"1px solid var(--goldDim)":"1px solid var(--border)",
                      borderRadius:8,cursor:(!p.on||voted)?"default":"pointer",
                      position:"relative",overflow:"hidden",textAlign:"left",
                      transition:"all .3s"}}>
                    <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,background:isMyChoice?"rgba(201,165,78,0.2)":"var(--glow)",transition:"width .5s",borderRadius:8}} />
                    <span style={{position:"relative",flex:1,fontSize:16,fontWeight:isMyChoice?600:500,color:isMyChoice?"var(--gold)":"var(--txt)"}}>{isMyChoice && "✓ "}{o.t}</span>
                    <span style={{position:"relative",fontSize:19,color:"var(--gold)",fontWeight:700}}>{pct}%</span>
                    <span style={{position:"relative",fontSize:17,color:"var(--mute)"}}>{o.v}</span>
                  </button>
                );
              })}
            </div>
            <div style={{marginTop:4,fontSize:17,color:"var(--mute)"}}>{total} vote{total!==1?"s":""}</div>
          </div>
        );
      })}
    </div>
  );
}

    setTxt("");
  };
  const filtered = day===0 ? items : items.filter(i => i.day===day);
  const pills = [{v:0,l:"All"},{v:1,l:"Day 1"},{v:2,l:"Day 2"},{v:3,l:"Day 3"}];

  return (
    <div>
      <div style={{display:"flex",gap:4,padding:"14px 20px",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
        <span style={{fontSize:18,color:"var(--mute)"}}>Day:</span>
        {pills.map(d => <button key={d.v} onClick={() => setDay(d.v)} className={`pill ${day===d.v?"active":""}`}>{d.l}</button>)}
      </div>
      {!dm && (
        <div style={{padding:20,borderBottom:"1px solid var(--border)"}}>
          <input value={nm} onChange={e=>setNm(e.target.value)} placeholder="Name (optional)" className="field" style={{maxWidth:200,marginBottom:7,display:"block"}} />
          <div style={{display:"flex",gap:7}}>
            <input value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Share your key takeaway..." className="field" style={{flex:1}} onKeyDown={e=>{if(e.key==="Enter")sub();}} />
            <button onClick={sub} className="btn-gold">Submit</button>
          </div>
        </div>
      )}
      <div style={{maxHeight:dm?"calc(100vh - 260px)":340,overflowY:"auto"}}>
        {filtered.length===0 && <p style={{textAlign:"center",padding:28,color:"var(--mute)",fontStyle:"italic"}}>No takeaways yet</p>}
        {[...filtered].sort((a,b) => b.ts-a.ts).map(it => (
          <div key={it._key} style={{padding:"16px 20px",borderBottom:"1px solid var(--border)"}}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {it.day>0 && <span style={{fontSize:17,padding:"1px 7px",borderRadius:8,background:"var(--glow)",border:"1px solid var(--border)",color:"var(--gold)",fontWeight:600}}>Day {it.day}</span>}
              <span style={{fontSize:18,color:"var(--goldDim)",fontWeight:500}}>{it.name}</span>
              <span style={{fontSize:17,color:"var(--mute)"}}>{ago(it.ts)}</span>
            </div>
            <p style={{margin:"3px 0 0",fontSize:17,lineHeight:1.5}}>💡 {it.text}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── EXPORT ───
function ExportTab({dm}) {
  const q = toArr(useFirebase("questions"));
  const c = toArr(useFirebase("comments"));
  const ph = toArr(useFirebase("photos"));
  const po = toArr(useFirebase("polls"));
  const rx = useFirebase("reactions") || {};
  const tk = toArr(useFirebase("takeaways"));

  const topQ = [...q].sort((a,b) => (b.votes||0)-(a.votes||0)).slice(0,10);
  const hs = {fontFamily:"var(--ff)",fontSize:19,color:"var(--gold)",fontWeight:700,marginBottom:6,borderBottom:"1px solid var(--border)",paddingBottom:4};
  const ts = {fontSize:17,lineHeight:1.6};

  const rxSum = [];
  AGENDA.forEach(day => day.ev.forEach((ev,i) => {
    const r = rx[`d${day.day}_${i}`];
    if(r) { const total = Object.values(r).reduce((s,v)=>s+v,0); if(total>0) rxSum.push({title:ev.n,day:day.day,...r,total}); }
  }));
  rxSum.sort((a,b) => b.total - a.total);

  return (
    <div style={{padding:20,maxHeight:dm?"calc(100vh - 180px)":500,overflowY:"auto"}}>
      <h2 style={{fontFamily:"var(--ff)",fontSize:28,color:"var(--gold)",fontWeight:800,margin:"0 0 16px"}}>📊 LC26 Summary</h2>
      <div style={{marginBottom:20}}><div style={hs}>Overview</div><div style={ts}>{q.length} questions · {c.length} shoutouts · {ph.length} photos · {po.length} polls · {tk.length} takeaways</div></div>
      <div style={{marginBottom:20}}><div style={hs}>Top Questions</div>
        {topQ.length===0 ? <div style={ts}>None</div> : topQ.map((q,i) => <div key={q._key} style={{...ts,padding:"2px 0"}}>{i+1}. {q.text} <span style={{color:"var(--gold)"}}>({q.votes} votes)</span> — {q.name}</div>)}
      </div>
      <div style={{marginBottom:20}}><div style={hs}>Session Engagement</div>
        {rxSum.length===0 ? <div style={ts}>None</div> : rxSum.slice(0,8).map((r,i) => <div key={i} style={{...ts,padding:"2px 0"}}>Day {r.day} — {r.title}: {EJ.map(em => r[em]?` ${em}${r[em]}`:"")} <span style={{color:"var(--gold)"}}>({r.total})</span></div>)}
      </div>
      <div style={{marginBottom:20}}><div style={hs}>Poll Results</div>
        {po.map(p => { const total=p.opts.reduce((s,o)=>s+o.v,0); return (
          <div key={p._key} style={{marginBottom:10}}>
            <div style={{...ts,fontWeight:600}}>{p.q} ({total} votes)</div>
            {p.opts.map((o,i) => <div key={i} style={{...ts,paddingLeft:12}}>{o.t}: {total>0?Math.round(o.v/total*100):0}% ({o.v})</div>)}
          </div>
        ); })}
      </div>
      {[1,2,3].map(d => { const dtk=tk.filter(t=>t.day===d); if(!dtk.length)return null; return (
        <div key={d} style={{marginBottom:20}}>
          <div style={hs}>Day {d} Takeaways ({dtk.length})</div>
          {dtk.map(t => <div key={t._key} style={{...ts,padding:"2px 0"}}>💡 {t.text} — {t.name}</div>)}
        </div>
      ); })}
    </div>
  );
}

// ─── WORKSHOP TAB ───
function WorkshopTab({dm, admin}) {
  const responsesRaw = useFirebase("workshop_responses");
  const responses = responsesRaw || {};

  // Load from localStorage: { caseId, teamName, submissionId }
  const [session, setSession] = useState(() => {
    try {
      const s = localStorage.getItem("lc26_workshop");
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  });

  const [guideViewed, setGuideViewed] = useState(() => {
    try { return localStorage.getItem("lc26_guide_viewed") === "true"; } catch { return false; }
  });

  const [pickingCase, setPickingCase] = useState(null); // which case was tapped (awaiting team name)
  const [teamNameInput, setTeamNameInput] = useState("");
  const [localAnswers, setLocalAnswers] = useState({});
  const [showGuide, setShowGuide] = useState(false); // for reference access from picker

  const acknowledgeGuide = () => {
    setGuideViewed(true);
    try { localStorage.setItem("lc26_guide_viewed", "true"); } catch {}
  };

  // Hydrate answers when session active
  useEffect(() => {
    if (session?.submissionId && responses[session.caseId]?.[session.submissionId]) {
      const saved = responses[session.caseId][session.submissionId];
      setLocalAnswers({
        a1: saved.a1 || "", a2: saved.a2 || "", a3: saved.a3 || "",
        a4: saved.a4 || "", a5: saved.a5 || ""
      });
    } else if (!session) {
      setLocalAnswers({});
    }
  }, [session, responsesRaw]);

  const cs = session ? CASES[session.caseId] : null;
  const teamResp = session?.submissionId ? responses[session.caseId]?.[session.submissionId] : null;
  const isSubmitted = teamResp?.submitted;

  const startSession = (caseId, teamName) => {
    const tn = teamName.trim();
    if (!tn) return;
    // Generate a unique submission ID based on team name + timestamp
    const submissionId = tn.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,30) + "_" + Date.now().toString(36).slice(-5);
    const s = { caseId, teamName: tn, submissionId };
    // Seed the firebase record
    fbUpdate(`workshop_responses/${caseId}/${submissionId}`, {
      teamName: tn,
      caseId: caseId,
      createdAt: Date.now(),
    });
    setSession(s);
    try { localStorage.setItem("lc26_workshop", JSON.stringify(s)); } catch {}
    setPickingCase(null);
    setTeamNameInput("");
  };

  const leaveSession = () => {
    setSession(null);
    setLocalAnswers({});
    try { localStorage.removeItem("lc26_workshop"); } catch {}
  };

  const saveAnswer = (qIdx, text) => {
    const key = `a${qIdx+1}`;
    const newAns = {...localAnswers, [key]: text};
    setLocalAnswers(newAns);
    fbUpdate(`workshop_responses/${session.caseId}/${session.submissionId}`, {
      ...newAns,
      teamName: session.teamName,
      caseId: session.caseId,
      lastSaved: Date.now(),
    });
  };

  const submit = () => {
    if (!window.confirm("Submit your team's responses?\n\nYou can still edit and resubmit after this.")) return;
    fbUpdate(`workshop_responses/${session.caseId}/${session.submissionId}`, {
      submitted: true,
      submittedAt: Date.now(),
    });
  };

  const editAgain = () => {
    if (!window.confirm("Edit your team's response?\n\nYou'll need to resubmit when done.")) return;
    fbUpdate(`workshop_responses/${session.caseId}/${session.submissionId}`, { submitted: false });
  };

  const unlockForEdit = () => {
    if (!admin) return;
    if (window.confirm("Unlock this team's response for editing?")) {
      fbUpdate(`workshop_responses/${session.caseId}/${session.submissionId}`, { submitted: false });
    }
  };

  const adminDeleteTeam = (caseId, submissionId, teamName) => {
    if (!admin) return;
    if (!window.confirm(`Delete "${teamName}"'s submission?\n\nThis cannot be undone.`)) return;
    fbRemove(`workshop_responses/${caseId}/${submissionId}`);
  };

  // Count submissions per case
  const caseStats = (cid) => {
    const subs = responses[cid] || {};
    const teams = Object.values(subs);
    const submitted = teams.filter(t => t?.submitted).length;
    const inProgress = teams.filter(t => !t?.submitted && t?.teamName).length;
    return { total: teams.length, submitted, inProgress };
  };

  // ADMIN: Export all responses
  const exportAll = () => {
    const lines = [];
    lines.push("═══════════════════════════════════════════════════════════════");
    lines.push("  LC26 WORKSHOP — TEAM RESPONSES FOR GRADING");
    lines.push(`  Exported: ${new Date().toLocaleString()}`);
    lines.push("═══════════════════════════════════════════════════════════════");

    // Course Guide / Grading context preamble
    lines.push("\n" + COURSE_GUIDE.tagline);
    lines.push("Public Club Case Study Contest\n");
    lines.push("EXERCISE OVERVIEW");
    lines.push(COURSE_GUIDE.intro);
    lines.push("");
    lines.push(COURSE_GUIDE.quote);
    lines.push("\n\nWHAT STRONG RESPONSES INCLUDE");
    COURSE_GUIDE.criteria.forEach(c => {
      lines.push(`    ${c.icon}  ${c.label} — ${c.text}`);
    });
    lines.push("\n\nSCORECARD — HOW THE ROUND IS GRADED");
    lines.push("Each hole (question) is scored 1–5. Par is 3. Lowest total wins.\n");
    COURSE_GUIDE.scorecard.forEach(s => {
      lines.push(`  ${s.score} · ${s.term} (${s.toPar})`);
      lines.push(`      ${s.desc}`);
    });
    lines.push("\nTHE ROUND");
    lines.push(`  Par for the course:  ${COURSE_GUIDE.round.par}`);
    lines.push(`  Best possible score: ${COURSE_GUIDE.round.best}`);
    lines.push(`  Worst possible score: ${COURSE_GUIDE.round.worst}`);
    lines.push("  Score to par is shown as +/– on each team's scorecard. Lowest score wins.");
    lines.push("\n═══════════════════════════════════════════════════════════════");
    lines.push("  TEAM RESPONSES");
    lines.push("═══════════════════════════════════════════════════════════════\n");

    CASE_LIST.forEach(cl => {
      if (!cl.available) return;
      const c = CASES[cl.id];
      const subs = responses[cl.id] || {};
      const teams = Object.entries(subs)
        .map(([sid, v]) => ({...v, _sid: sid}))
        .filter(t => t.teamName);

      lines.push(`\n\n╔══════════════════════════════════════════════════════════════╗`);
      lines.push(`║ CASE: ${c.title}`);
      lines.push(`║ TEAMS: ${teams.length} total · ${teams.filter(t=>t.submitted).length} submitted`);
      lines.push(`╚══════════════════════════════════════════════════════════════╝`);

      if (teams.length === 0) {
        lines.push("\n(No teams have started this case yet.)\n");
        return;
      }

      teams.forEach((t, idx) => {
        lines.push(`\n────────────────────────────────────────────────────────────────`);
        lines.push(`TEAM ${idx+1}: ${t.teamName}`);
        lines.push(`STATUS: ${t.submitted ? "✓ Submitted" : "In Progress"}`);
        if (t.submittedAt) lines.push(`SUBMITTED: ${new Date(t.submittedAt).toLocaleString()}`);
        lines.push(`────────────────────────────────────────────────────────────────\n`);
        c.questions.forEach((q, i) => {
          lines.push(`\nQuestion ${i+1}: ${q.title}`);
          lines.push(`${q.text}\n`);
          lines.push(`Answer:`);
          lines.push(`${t[`a${i+1}`] || "(no response)"}\n`);
        });
      });
    });
    const blob = new Blob([lines.join("\n")], {type:"text/plain"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `lc26-workshop-responses-${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

        <p style={{fontSize:14,color:"var(--goldDim)",lineHeight:1.6,fontStyle:"italic"}}>{COURSE_GUIDE.quote}</p>

        </div>
      </div>

      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:20,marginBottom:24}}>
        <div style={{fontSize:12,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>The Round</div>
        <div style={{fontSize:14,color:"var(--txt)",lineHeight:1.8}}>
          <div><span style={{color:"var(--goldDim)",fontWeight:600}}>Par for the course:</span> {COURSE_GUIDE.round.par}</div>
          <div><span style={{color:"var(--goldDim)",fontWeight:600}}>Best possible score:</span> {COURSE_GUIDE.round.best}</div>
          <div><span style={{color:"var(--goldDim)",fontWeight:600}}>Worst possible score:</span> {COURSE_GUIDE.round.worst}</div>
        </div>
        <p style={{fontSize:12,color:"var(--dim)",marginTop:10,fontStyle:"italic"}}>Score to par is shown as +/– on each team's scorecard. Lowest score wins.</p>
      </div>

      <div style={{textAlign:"center"}}>
        <p style={{fontFamily:"var(--ff)",fontStyle:"italic",fontSize:15,color:"var(--goldDim)",marginBottom:16}}>
          Remember: in golf and in finance, precision beats power.<br/>Show your work, cite the numbers, and make it count. ⛳
        </p>
        {isGate ? (
          <button onClick={acknowledgeGuide} className="btn-gold" style={{padding:"14px 40px",fontSize:17}}>
            Ready to Play →
          </button>
        ) : (
          <button onClick={() => setShowGuide(false)} className="btn-gold" style={{padding:"12px 32px",fontSize:15}}>
            Back to Cases
          </button>
        )}
      </div>
    </div>
  );

  // Force the guide on first use — unless admin (they need to manage without being blocked)
  if (!admin && !guideViewed && !session) {
    return renderCourseGuide(true);
  }

  // On-demand guide access (from picker)
  if (showGuide) {
    return renderCourseGuide(false);
  }

  // ── Prompt for team name after case pick ──
  if (pickingCase) {
    const c = CASES[pickingCase];
    return (
      <div style={{padding:"32px 20px",textAlign:"center",maxWidth:520,margin:"0 auto"}}>
        <div style={{fontSize:40,marginBottom:12}}>🎓</div>
        <h2 style={{fontFamily:"var(--ff)",fontSize:24,color:"var(--gold)",fontWeight:700,marginBottom:6}}>{c.title}</h2>
        <p style={{fontSize:14,color:"var(--dim)",marginBottom:24}}>Before you start, tell us your team name so your answers stay grouped together.</p>
        <input value={teamNameInput} onChange={e=>setTeamNameInput(e.target.value)} placeholder="Your team name (e.g. 'The Eagles')"
          className="field" style={{textAlign:"center",fontSize:18,maxWidth:340,margin:"0 auto",display:"block",marginBottom:16}}
          onKeyDown={e=>{if(e.key==="Enter"&&teamNameInput.trim())startSession(pickingCase, teamNameInput);}}
          autoFocus />
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={() => {setPickingCase(null);setTeamNameInput("");}} className="btn-sm" style={{padding:"10px 20px",fontSize:14}}>Cancel</button>
          <button onClick={() => startSession(pickingCase, teamNameInput)} disabled={!teamNameInput.trim()} className="btn-gold" style={{padding:"10px 28px",fontSize:15,opacity:teamNameInput.trim()?1:0.5}}>
            Start Working →
          </button>
        </div>
      </div>
    );
  }

  // ── No active session: show case picker (+ admin view) ──
  if (!session) {
    return (
      <div style={{padding:"24px 20px",maxHeight:dm?"calc(100vh - 180px)":"auto",overflowY:"auto"}}>
        {admin && (
          <div style={{marginBottom:24,padding:16,background:"var(--card)",border:"1px solid var(--border)",borderRadius:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Admin — Live Submissions</div>
              <button onClick={exportAll} className="btn-gold" style={{fontSize:14,padding:"8px 16px"}}>📊 Export All</button>
            </div>
            {CASE_LIST.filter(c=>c.available).map(cl => {
              const stats = caseStats(cl.id);
              const subs = responses[cl.id] || {};
              const teams = Object.entries(subs).map(([sid, v]) => ({...v, _sid: sid})).filter(t=>t.teamName);
              return (
                <div key={cl.id} style={{marginBottom:14,padding:12,background:"var(--input)",borderRadius:8,border:"1px solid var(--border)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div>
                      <span style={{fontFamily:"var(--ff)",fontSize:15,fontWeight:700,color:"var(--gold)"}}>{cl.label}</span>
                      <span style={{fontSize:12,color:"var(--dim)",marginLeft:8}}>({cl.subtitle})</span>
                    </div>
                    <div style={{fontSize:12,color:"var(--dim)"}}>
                      <span style={{color:"var(--gold)",fontWeight:600}}>{stats.submitted}</span> submitted · <span style={{color:"var(--goldDim)"}}>{stats.inProgress}</span> in progress
                    </div>
                  </div>
                  {teams.length > 0 ? (
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6}}>
                      {teams.map(t => {
                        let count = 0;
                        for (let i=1;i<=5;i++) if (t[`a${i}`]?.trim()) count++;
                        return (
                          <div key={t._sid} style={{padding:"6px 10px",background:"var(--bg)",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,border:`1px solid ${t.submitted?"var(--gold)":"var(--border)"}`}}>
                            <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
                              <div style={{fontSize:13,fontWeight:600,color:"var(--txt)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.teamName}</div>
                              <div style={{fontSize:10,color:t.submitted?"var(--gold)":"var(--dim)"}}>{t.submitted ? "✓ Submitted" : `${count}/5`}</div>
                            </div>
                            <button onClick={() => adminDeleteTeam(cl.id, t._sid, t.teamName)} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:14,padding:2}} title="Delete">🗑</button>
                          </div>
                        );
                      })}
                    </div>
                  ) : <div style={{fontSize:12,color:"var(--mute)",fontStyle:"italic"}}>No teams yet</div>}
                </div>
              );
            })}
          </div>
        )}
        <div style={{textAlign:"center",padding:"24px 16px"}}>
          <div style={{fontSize:40,marginBottom:12}}>🎓</div>
          <h2 style={{fontFamily:"var(--ff)",fontSize:26,color:"var(--gold)",fontWeight:700,marginBottom:8}}>Case Workshop</h2>
          <p style={{fontSize:16,color:"var(--dim)",marginBottom:24,maxWidth:480,margin:"0 auto 24px"}}>
            Select the case your team has been assigned.
          </p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12,maxWidth:620,margin:"0 auto"}}>
            {CASE_LIST.map(cl => {
              const stats = cl.available ? caseStats(cl.id) : {total:0};
              return (
                <button key={cl.id} onClick={() => cl.available && setPickingCase(cl.id)} disabled={!cl.available}
                  style={{padding:"18px 20px",
                    background:cl.available?"var(--card)":"rgba(26,43,32,0.4)",
                    border:`2px solid ${cl.available?"var(--border)":"var(--border)"}`,
                    borderRadius:12,cursor:cl.available?"pointer":"not-allowed",textAlign:"left",transition:"all .2s",
                    opacity:cl.available?1:0.5}}
                  onMouseEnter={e=>{if(cl.available){e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.transform="translateY(-2px)";}}}
                  onMouseLeave={e=>{if(cl.available){e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="translateY(0)";}}}>
                  <div style={{fontFamily:"var(--ff)",fontSize:20,fontWeight:700,color:cl.available?"var(--gold)":"var(--dim)"}}>{cl.label}</div>
                  <div style={{fontSize:14,color:"var(--dim)",marginTop:4}}>{cl.subtitle}</div>
                  {cl.available && stats.total > 0 && (
                    <div style={{fontSize:11,color:"var(--goldDim)",marginTop:8,fontWeight:600}}>{stats.total} {stats.total===1?"team":"teams"} active</div>
                  )}
                </button>
              );
            })}
          </div>
          <p style={{marginTop:24,fontSize:12,color:"var(--mute)",fontStyle:"italic"}}>
            Multiple teams can work on the same case — you'll enter your team name after selecting.
          </p>
          <div style={{marginTop:16}}>
            <button onClick={() => setShowGuide(true)} className="btn-sm" style={{padding:"8px 18px",fontSize:13,borderColor:"var(--goldDim)",color:"var(--goldDim)"}}>
              📖 Review Course Guide
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── Active session: show case + response form ──
  return (
    <div style={{maxHeight:dm?"calc(100vh - 180px)":"auto",overflowY:"auto"}}>
      {/* Team header */}
      <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",background:"var(--card)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:12,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Team</div>
          <div style={{fontFamily:"var(--ff)",fontSize:22,color:"var(--gold)",fontWeight:700}}>{session.teamName}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {isSubmitted && <span style={{padding:"4px 10px",background:"var(--glow)",border:"1px solid var(--gold)",borderRadius:8,color:"var(--gold)",fontSize:13,fontWeight:600}}>✓ Submitted</span>}
          <button onClick={leaveSession} className="btn-sm">Leave Team</button>
          {admin && isSubmitted && <button onClick={unlockForEdit} className="btn-sm" style={{borderColor:"var(--red)",color:"var(--red)"}}>Unlock</button>}
        </div>
      </div>

      {/* Case context */}
      <div style={{padding:"20px",borderBottom:"1px solid var(--border)"}}>
        <h2 style={{fontFamily:"var(--ff)",fontSize:24,color:"var(--gold)",fontWeight:700,marginBottom:4}}>{cs.title}</h2>
        <div style={{fontSize:14,color:"var(--goldDim)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>{cs.subtitle}</div>
        <p style={{fontSize:16,color:"var(--txt)",lineHeight:1.6}}>{cs.context}</p>
      </div>

      {/* Key stats table */}
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>📊 Key Performance Data — March 2026</div>
        <div style={{background:"var(--input)",borderRadius:10,overflow:"hidden",border:"1px solid var(--border)"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:0,background:"var(--card)",padding:"10px 14px",fontSize:12,fontWeight:600,color:"var(--goldDim)",textTransform:"uppercase",letterSpacing:1,borderBottom:"1px solid var(--border)"}}>
            <div>Metric</div><div style={{textAlign:"right"}}>Actual</div><div style={{textAlign:"right"}}>Budget/Fcst</div><div style={{textAlign:"right"}}>Variance</div>
          </div>
          {cs.keyStats.map((s,i) => (
            <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:0,padding:"8px 14px",fontSize:14,borderBottom:i<cs.keyStats.length-1?"1px solid var(--border)":"none"}}>
              <div style={{color:"var(--txt)",fontWeight:s.label.startsWith("  ")?400:500}}>{s.label}</div>
              <div style={{textAlign:"right",color:"var(--txt)",fontVariantNumeric:"tabular-nums"}}>{s.actual}</div>
              <div style={{textAlign:"right",color:"var(--dim)",fontVariantNumeric:"tabular-nums"}}>{s.budget}</div>
              <div style={{textAlign:"right",fontWeight:600,fontVariantNumeric:"tabular-nums",color:s.delta.startsWith("+")&&!s.delta.includes("✓")?"var(--gold)":s.delta.startsWith("-")&&!s.delta.includes("✓")?"var(--red)":"var(--goldDim)"}}>{s.delta}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Questions + answers */}
      <div style={{padding:"20px"}}>
        <div style={{fontSize:14,color:"var(--goldDim)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>📝 Your Responses</div>
        {!isSubmitted && <p style={{fontSize:13,color:"var(--dim)",marginBottom:16,fontStyle:"italic"}}>Answers auto-save as you type. Submit when your team is ready — you can still edit and resubmit after.</p>}

        {cs.questions.map((q, i) => (
          <div key={i} style={{marginBottom:24,padding:16,background:"var(--card)",borderRadius:12,border:"1px solid var(--border)"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
              <div style={{background:"var(--gold)",color:"var(--bg)",width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0,fontSize:14}}>{i+1}</div>
              <div>
                <div style={{fontFamily:"var(--ff)",fontSize:17,color:"var(--gold)",fontWeight:700,marginBottom:4}}>{q.title}</div>
                <div style={{fontSize:15,color:"var(--txt)",lineHeight:1.55}}>{q.text}</div>
              </div>
            </div>
            <textarea
              value={localAnswers[`a${i+1}`] || ""}
              onChange={e => saveAnswer(i, e.target.value)}
              disabled={isSubmitted}
              placeholder="Type your team's response here..."
              rows={6}
              className="field"
              style={{resize:"vertical",marginTop:10,minHeight:120,opacity:isSubmitted?0.7:1,cursor:isSubmitted?"not-allowed":"text"}}
            />
            {localAnswers[`a${i+1}`] && (
              <div style={{fontSize:11,color:"var(--mute)",marginTop:4,textAlign:"right"}}>
                {localAnswers[`a${i+1}`].length} characters · auto-saved
              </div>
            )}
          </div>
        ))}

        {/* Submit / Edit block */}
        <div style={{marginTop:24,padding:"20px",background:"var(--card)",borderRadius:12,border:`2px solid ${isSubmitted?"var(--gold)":"var(--border)"}`,textAlign:"center"}}>
          {isSubmitted ? (
            <div>
              <div style={{fontSize:32,marginBottom:8}}>✅</div>
              <div style={{fontFamily:"var(--ff)",fontSize:20,color:"var(--gold)",fontWeight:700,marginBottom:4}}>Responses Submitted</div>
              <div style={{fontSize:13,color:"var(--dim)",marginBottom:16}}>
                Submitted {teamResp?.submittedAt ? new Date(teamResp.submittedAt).toLocaleString() : "recently"}
              </div>
              <button onClick={editAgain} className="btn-sm" style={{padding:"10px 24px",fontSize:14,borderColor:"var(--gold)",color:"var(--gold)"}}>
                ✏️ Edit & Resubmit
              </button>
            </div>
          ) : (
            <>
              <p style={{fontSize:14,color:"var(--dim)",marginBottom:14}}>
                Review your responses above, then submit when your team agrees on final answers.
              </p>
              <button onClick={submit} className="btn-gold" style={{fontSize:17,padding:"14px 36px"}}>
                🎯 Submit {teamResp?.submittedAt ? "Updated" : ""} Responses
              </button>
              {teamResp?.submittedAt && (
                <div style={{fontSize:12,color:"var(--mute)",marginTop:8}}>
                  Previously submitted {new Date(teamResp.submittedAt).toLocaleString()}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── WELCOME ───
function Welcome({onEnter}) {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 24px",textAlign:"center",minHeight:"100vh",background:`radial-gradient(ellipse at 50% 30%, #1a2e1f 0%, var(--bg) 70%)`}}>
      <div style={{fontSize:16,letterSpacing:6,textTransform:"uppercase",color:"var(--goldDim)",fontWeight:600,marginBottom:16}}>Century Golf Partners</div>
      <h1 style={{fontFamily:"var(--ff)",fontWeight:800,fontSize:52,color:"var(--gold)",lineHeight:1.1,marginBottom:8,textShadow:"0 2px 40px rgba(201,165,78,.2)"}}>LC26 Live Wall</h1>
      <p style={{fontFamily:"var(--ff)",fontStyle:"italic",fontSize:22,color:"var(--dim)",marginBottom:28}}>Back to the Basics — Past · Present · People</p>
      {CONF_START > Date.now() && <Countdown />}
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:20,padding:28,marginBottom:28,boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
        <QRCode size={220} />
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginBottom:28}}>
        {["📋 Agenda","💬 Q&A","🎉 Shoutouts","📸 Photos","📊 Polls","💡 Takeaways"].map(x => (
          <span key={x} style={{padding:"8px 18px",borderRadius:20,background:"var(--glow)",border:"1px solid var(--border)",fontSize:16,fontWeight:500}}>{x}</span>
        ))}
      </div>
      <button onClick={onEnter} className="btn-gold" style={{padding:"18px 48px",fontSize:22,borderRadius:14}}>Enter the Wall →</button>
      <p style={{marginTop:32,fontSize:15,color:"var(--mute)",letterSpacing:2}}>April 27–30, 2026 · Dallas, TX</p>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [scr, setScr] = useState("welcome");
  const [tab, setTab] = useState("agenda");
  const [dm, setDm] = useState(false);
  const [admin, setAdmin] = useState(false);
  const [showAdm, setShowAdm] = useState(false);
  const [showExp, setShowExp] = useState(false);
  const [pin, setPin] = useState(""); const [showPin, setShowPin] = useState(false);

  // Live counts from Firebase
  const qRaw = useFirebase("questions");
  const cRaw = useFirebase("comments");
  const phRaw = useFirebase("photos");
  const poRaw = useFirebase("polls");
  const tkRaw = useFirebase("takeaways");
  const settingsRaw = useFirebase("settings");
  const workshopVisible = settingsRaw?.workshopVisible === true;

  const cnt = {
    q: toArr(qRaw).length,
    c: toArr(cRaw).length,
    p: toArr(phRaw).length,
    po: toArr(poRaw).filter(p=>p.on).length,
    tk: toArr(tkRaw).length,
  };

  const tryPin = () => { if(pin===ADMIN_PIN){setAdmin(true);setShowPin(false);setPin("");}else setPin(""); };

  // If workshop becomes hidden and user was on it (and isn't admin), bump them back
  useEffect(() => {
    if (tab === "workshop" && !workshopVisible && !admin) setTab("agenda");
  }, [tab, workshopVisible, admin]);

  const allTabs = [
    {id:"agenda",label:"Agenda",icon:"📋",count:0},
    {id:"questions",label:"Q&A",icon:"💬",count:cnt.q},
    {id:"comments",label:"Shoutouts",icon:"🎉",count:cnt.c},
    {id:"photos",label:"Photos",icon:"📸",count:cnt.p},
    {id:"polls",label:"Polls",icon:"📊",count:cnt.po},
    {id:"takeaways",label:"Takeaways",icon:"💡",count:cnt.tk},
    {id:"workshop",label:"Workshop",icon:"🎓",count:0,adminOnly:!workshopVisible},
  ];
  // Hide workshop from non-admins when not visible
  const tabs = allTabs.filter(t => !t.adminOnly || admin);

  if (scr==="welcome") return <Welcome onEnter={() => setScr("main")} />;

  return (
    <div className={dm?"dm":""}>
      {/* Header */}
      <div style={{padding:"16px 24px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--card)",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <h1 style={{fontFamily:"var(--ff)",fontWeight:700,fontSize:dm?32:24,color:"var(--gold)"}}> LC26 Live Wall</h1>
          <span style={{fontSize:13,color:"var(--mute)",letterSpacing:3,textTransform:"uppercase"}}>CGP</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={() => setScr("welcome")} className="btn-sm">QR</button>
          <button onClick={() => setDm(!dm)} className={`btn-sm ${dm?"active":""}`}>{dm?"✦ Display":"Display"}</button>
          {admin ? (<>
            <button onClick={() => setShowAdm(true)} className="btn-sm" style={{borderColor:"var(--red)",color:"var(--red)"}}>⚙️</button>
            <button onClick={() => setShowExp(!showExp)} className="btn-sm" style={{borderColor:"var(--goldDim)",color:"var(--goldDim)"}}>📊</button>
          </>) : (
            <button onClick={() => setShowPin(true)} className="btn-sm">⚙️</button>
          )}
        </div>
      </div>

      <AnnBanner />

      {!showExp && (
        <div style={{display:"flex",gap:2,borderBottom:"1px solid var(--border)",padding:"0 6px",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`tab-btn ${tab===t.id?"active":""}`} title={t.adminOnly?"Hidden from attendees — admin only":""}>
              {t.icon} {t.label}
              {t.adminOnly && <span style={{marginLeft:4,fontSize:10,color:"var(--red)"}}>🔒</span>}
              {t.count>0 && <span className="tab-count" style={{background:tab===t.id?"var(--gold)":"var(--border)",color:tab===t.id?"var(--bg)":"var(--dim)"}}>{t.count}</span>}
            </button>
          ))}
        </div>
      )}

      <div style={{animation:"fadeIn .3s"}}>
        {showExp ? <ExportTab dm={dm} /> : (<>
          {tab==="agenda" && <AgendaTab dm={dm} />}
          {tab==="questions" && <QTab dm={dm} />}
          {tab==="comments" && <CTab dm={dm} />}
          {tab==="photos" && <PTab dm={dm} admin={admin} />}
          {tab==="polls" && <PoTab dm={dm} admin={admin} />}
          {tab==="takeaways" && <TkTab dm={dm} />}
          {tab==="workshop" && <WorkshopTab dm={dm} admin={admin} />}
        </>)}
      </div>

      {showAdm && <AdminModal onClose={() => setShowAdm(false)} />}

      {showPin && (
        <div className="overlay" onClick={() => {setShowPin(false);setPin("");}}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:260,textAlign:"center"}}>
            <div style={{fontFamily:"var(--ff)",fontSize:19,color:"var(--gold)",fontWeight:700,marginBottom:12}}>Admin Access</div>
            <input value={pin} onChange={e=>setPin(e.target.value)} type="password" maxLength={4} placeholder="PIN"
              className="field" style={{width:100,fontSize:22,textAlign:"center",letterSpacing:6,display:"inline-block"}}
              onKeyDown={e=>{if(e.key==="Enter")tryPin();}} autoFocus />
            <div style={{marginTop:12,display:"flex",gap:6,justifyContent:"center"}}>
              <button onClick={() => {setShowPin(false);setPin("");}} className="btn-sm" style={{padding:"6px 12px"}}>Cancel</button>
              <button onClick={tryPin} className="btn-gold" style={{padding:"6px 14px",fontSize:12}}>Unlock</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
